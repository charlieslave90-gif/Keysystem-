<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Key Generator | Simple Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 40px 32px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subhead {
            color: #64748b;
            font-size: 0.8rem;
            border-bottom: 2px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 8px;
            margin-bottom: 28px;
        }

        .api-badge {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 24px;
            font-size: 0.7rem;
            color: #475569;
            word-break: break-all;
        }

        .key-display {
            background: #f8fafc;
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            border: 1px solid #e2e8f0;
        }

        .key-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 12px;
        }

        .key-value {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            color: #3b82f6;
            background: white;
            padding: 16px;
            border-radius: 16px;
            word-break: break-all;
            border: 1px solid #e2e8f0;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: #1e293b;
            color: white;
        }

        .btn-primary:hover {
            background: #0f172a;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
            transform: translateY(-1px);
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .message.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #94a3b8;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔑 KEY GENERATOR</h1>
            <div class="subhead">simple · fast · secure</div>
            
            <div class="api-badge">
                📡 API: http://87.106.155.7:11489/
            </div>
            
            <div class="key-display">
                <div class="key-label">🔐 GENERATED KEY</div>
                <div class="key-value" id="keyDisplay">—</div>
                
                <div class="button-group">
                    <button class="btn btn-primary" id="generateBtn">
                        <span>🎲</span> Generate Key
                    </button>
                    <button class="btn btn-secondary" id="copyBtn" disabled>
                        📋 Copy
                    </button>
                </div>
                
                <div id="messageArea"></div>
            </div>
            
            <button class="btn btn-success" id="useKeyBtn" style="margin-top: 8px;">
                <span>🔓</span> Use This Key
            </button>
            
            <div class="footer">
                Click Generate to get a new key from the API
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://87.106.155.7:11489/";
        
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const useKeyBtn = document.getElementById('useKeyBtn');
        const keyDisplay = document.getElementById('keyDisplay');
        const messageArea = document.getElementById('messageArea');
        
        let currentKey = null;
        
        function showMessage(text, type) {
            messageArea.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (messageArea.innerHTML.includes(text)) {
                    messageArea.innerHTML = '';
                }
            }, 4000);
        }
        
        function clearMessage() {
            messageArea.innerHTML = '';
        }
        
        async function generateKey() {
            try {
                generateBtn.disabled = true;
                generateBtn.innerHTML = '<span class="loading"></span> Generating...';
                copyBtn.disabled = true;
                clearMessage();
                
                // Try different endpoint patterns
                let response;
                let data;
                
                // Try /generate first
                try {
                    response = await fetch(`${API_BASE}generate`, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    
                    if (response.ok) {
                        data = await response.json();
                    } else {
                        throw new Error('Not found');
                    }
                } catch (e) {
                    // Try /gen
                    try {
                        response = await fetch(`${API_BASE}gen`, {
                            method: 'GET',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        if (response.ok) {
                            data = await response.json();
                        } else {
                            throw new Error('Not found');
                        }
                    } catch (e2) {
                        // Try root with POST
                        response = await fetch(API_BASE, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        data = await response.json();
                    }
                }
                
                // Extract key from response (handle different formats)
                let extractedKey = null;
                if (data.key) {
                    extractedKey = data.key;
                } else if (data.token) {
                    extractedKey = data.token;
                } else if (data.code) {
                    extractedKey = data.code;
                } else if (data.result) {
                    extractedKey = data.result;
                } else if (typeof data === 'string') {
                    extractedKey = data;
                } else if (data.data && data.data.key) {
                    extractedKey = data.data.key;
                } else {
                    // If response is just a string
                    const text = await response.text();
                    if (text && text.length < 100) {
                        extractedKey = text;
                    } else {
                        throw new Error('Could not extract key from response');
                    }
                }
                
                currentKey = extractedKey;
                keyDisplay.textContent = currentKey;
                copyBtn.disabled = false;
                showMessage('✅ Key generated successfully!', 'success');
                
            } catch (error) {
                console.error('Generate error:', error);
                showMessage(`❌ Failed to generate key: ${error.message}`, 'error');
                keyDisplay.textContent = '—';
                currentKey = null;
                copyBtn.disabled = true;
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<span>🎲</span> Generate Key';
            }
        }
        
        function copyKey() {
            if (!currentKey) {
                showMessage('⚠️ No key to copy. Generate one first.', 'error');
                return;
            }
            
            navigator.clipboard.writeText(currentKey).then(() => {
                showMessage('📋 Key copied to clipboard!', 'success');
            }).catch(() => {
                showMessage('❌ Failed to copy key', 'error');
            });
        }
        
        function useKey() {
            if (!currentKey) {
                showMessage('⚠️ No key generated. Generate one first.', 'error');
                return;
            }
            
            // Copy to clipboard and show success
            navigator.clipboard.writeText(currentKey);
            showMessage(`🔑 Key "${currentKey}" is ready to use! Copied to clipboard.`, 'success');
            
            // Optional: redirect to a verification page
            // window.location.href = `https://your-site.com/verify?key=${currentKey}`;
        }
        
        // Event listeners
        generateBtn.addEventListener('click', generateKey);
        copyBtn.addEventListener('click', copyKey);
        useKeyBtn.addEventListener('click', useKey);
        
        // Auto-generate on page load (optional)
        setTimeout(() => {
            generateKey();
        }, 300);
        
        // Check API status on load
        async function checkAPI() {
            try {
                const response = await fetch(API_BASE, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    console.log('✅ API is reachable');
                }
            } catch (error) {
                console.warn('⚠️ API might be offline:', error.message);
                showMessage('⚠️ API server might be offline. Check your connection.', 'info');
            }
        }
        checkAPI();
    </script>
</body>
</html>
