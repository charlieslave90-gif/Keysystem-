<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KeySystem | Unlock & Access</title>
    
    <!-- Linkvertise Publisher Script -->
    <script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
    <script>
        linkvertise(4752730, {
            whitelist: ["https://keysystem-ruddy.vercel.app/", "", window.location.origin + "/"],
            blacklist: []
        });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8eef2;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 32px 28px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e2a3a;
            margin-bottom: 6px;
        }

        .subhead {
            color: #6c7a8a;
            font-size: 0.8rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 6px;
            margin-bottom: 24px;
        }

        .gui-panel {
            background: #f7f9fc;
            border-radius: 20px;
            padding: 28px 20px;
            margin: 16px 0 20px;
            border: 1px solid #e2edf2;
        }

        .status-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            padding: 10px 18px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto 24px auto;
            border: 1px solid #dee4e9;
        }

        .lock-dot {
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            transition: 0.2s;
        }

        .lock-dot.unlocked {
            background: #2ecc71;
            box-shadow: 0 0 6px #2ecc71;
        }

        .status-text {
            font-weight: 600;
            font-size: 0.9rem;
            color: #2c3e50;
        }

        .instruction {
            font-size: 1rem;
            color: #2c3e50;
            background: #ffffffcc;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 28px;
        }

        .instruction strong {
            color: #2980b9;
        }

        .action-btn {
            background: #1e2f3f;
            border: none;
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn:hover {
            background: #0f1e2a;
            transform: translateY(-1px);
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* THE CLICKABLE LINK */
        .access-link {
            display: block;
            margin-top: 20px;
            padding: 14px 20px;
            background: #dcfce7;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            color: #166534;
            transition: 0.2s;
            border: 1px solid #86efac;
        }

        .access-link:hover {
            background: #bbf7d0;
            transform: translateY(-2px);
        }

        .hidden {
            display: none;
        }

        .redirect-hint {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #8a9bb0;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 40px;
        }

        hr {
            margin: 24px 0 12px;
            border: none;
            border-top: 1px solid #e9edf2;
        }

        .footer-note {
            font-size: 0.65rem;
            color: #9aaebf;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔑 KEYSYSTEM</h1>
    <div class="subhead">secure gateway · verification required</div>
    
    <div class="gui-panel">
        <div class="status-area">
            <span class="lock-dot" id="statusDot"></span>
            <span class="status-text" id="statusLabel">🔒 Key Locked</span>
        </div>
        
        <div class="instruction">
            ⚡ <strong>Complete this to unlock the key.</strong><br>
            Click the button below to verify access.
        </div>
        
        <button class="action-btn" id="unlockBtn">
            <span>🔓</span> Complete this to unlock the key
        </button>
        
        <!-- CLICKABLE LINK TO PASTEBIN - appears after unlock -->
        <a href="https://pastebin.com/raw/8CYSuk2j" class="access-link hidden" id="pastebinLink" target="_blank">
            📄 CLICK HERE TO GET YOUR KEY →
        </a>
        
        <div class="redirect-hint">
            ⤴️ After completion, click the link above to access your content
        </div>
    </div>
    
    <hr>
    <div class="footer-note">
        Linkvertise • protected gateway
    </div>
</div>

<script>
    const unlockBtn = document.getElementById('unlockBtn');
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const pastebinLink = document.getElementById('pastebinLink');
    
    let isUnlocked = false;
    let isProcessing = false;
    
    function updateUI() {
        if (isUnlocked) {
            statusDot.classList.add('unlocked');
            statusLabel.innerHTML = '✅ Key Unlocked';
            unlockBtn.innerHTML = '<span>✓</span> Completed';
            unlockBtn.disabled = true;
            // SHOW THE CLICKABLE LINK
            pastebinLink.classList.remove('hidden');
        } else {
            statusDot.classList.remove('unlocked');
            statusLabel.innerHTML = '🔒 Key Locked';
            unlockBtn.innerHTML = '<span>🔓</span> Complete this to unlock the key';
            unlockBtn.disabled = false;
            pastebinLink.classList.add('hidden');
        }
    }
    
    function completeUnlock() {
        if (isProcessing || isUnlocked) return;
        
        isProcessing = true;
        unlockBtn.disabled = true;
        unlockBtn.innerHTML = '<span>⏳</span> Processing...';
        
        setTimeout(() => {
            isUnlocked = true;
            isProcessing = false;
            updateUI();
        }, 400);
    }
    
    unlockBtn.addEventListener('click', completeUnlock);
    updateUI();
</script>
</body>
</html>
